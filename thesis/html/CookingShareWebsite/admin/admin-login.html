<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Công thức - CookingShare</title>
    
    <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/vendor/font-awesome/css/all.min.css">
    <script src="assets/vendor/chart/chart.umd.min.js"></script>
    <link href="assets/vendor/summernote/summernote-bs5.min.css" rel="stylesheet">
    <link href="assets/vendor/datatables/css/datatables.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin-auth.css">

</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card border-0 shadow-lg login-card">
            
            <div class="login-header" style="background-color: #2a3644;"> <div class="bg-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2 shadow" style="width: 70px; height: 70px;">
                <i class="fas fa-utensils fa-2x" style="color: #2a9d46;"></i>
            </div>
            
            <h2 class="mb-0 font-handwriting" style="color: #f26b21; font-weight: 700; font-size: 2.5rem; text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);">CookingShare</h2>
            
            <p class="text-white-50 small mb-0 mt-1">Hệ thống Quản trị Nội dung</p>
        </div>

            <div class="card-body p-4 p-md-5">
                <h5 class="fw-bold text-center mb-4 text-dark">Đăng nhập</h5>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">Tài khoản đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                            
                            <input type="text" class="form-control border-start-0 ps-0" id="loginAccount" placeholder="Username" required 
                                oninvalid="this.setCustomValidity('Vui lòng nhập tài khoản đăng nhập')" 
                                oninput="this.setCustomValidity('')">
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label class="form-label fw-bold small text-muted">Mật khẩu</label>
                            <a href="admin-forgot-password.html" class="small text-decoration-none text-primary">Quên mật khẩu?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0 ps-0" id="loginPassword" placeholder="Nhập mật khẩu" required
                                oninvalid="this.setCustomValidity('Vui lòng nhập mật khẩu')" 
                                oninput="this.setCustomValidity('')">
                            <span class="input-group-text bg-white password-toggle" id="togglePassword">
                                <i class="fas fa-eye-slash text-muted"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">Ghi nhớ đăng nhập</label>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold py-2" id="btnLogin">
                        <i class="fas fa-sign-in-alt me-2"></i> Đăng nhập
                    </button>
                </form>
                
            </div>
        </div>
    </div>

    <script src="../assets/vendor/jquery/jquery.min.js"></script>
    <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/vendor/chart/chart.umd.min.js"></script>
    <script src="assets/vendor/summernote/summernote-bs5.min.js"></script>
    <script src="assets/vendor/datatables/js/datatables.min.js"></script>
    <script src="assets/js/admin-auth.js"></script> 
</body>
</html>
