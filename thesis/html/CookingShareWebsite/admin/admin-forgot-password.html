<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Công thức - CookingShare</title>
    
    <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/vendor/font-awesome/css/all.min.css">
    <script src="assets/vendor/chart/chart.umd.min.js"></script>
    <link href="assets/vendor/summernote/summernote-bs5.min.css" rel="stylesheet">
    <link href="assets/vendor/datatables/css/datatables.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin-auth.css">

</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card border-0 shadow-lg auth-card">
            
            <div class="login-header" style="background-color: #2a3644;"> 
                <div class="bg-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2 shadow" style="width: 70px; height: 70px;">
                    <i class="fas fa-key fa-2x" style="color: #f26b21;"></i>
                </div>
                
                <h2 class="mb-0 font-handwriting" style="color: #f26b21; font-weight: 700; font-size: 2.5rem; text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);">CookingShare</h2>
                <p class="text-white-50 small mb-0 mt-1">Hệ thống Quản trị Nội dung</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h5 class="fw-bold text-dark mb-2">Khôi phục mật khẩu</h5>
                    <p class="text-muted small">Vui lòng nhập địa chỉ email liên kết với tài khoản Admin. Chúng tôi sẽ gửi liên kết đặt lại mật khẩu.</p>
                </div>
                
                <form id="forgotPasswordForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">Email khôi phục</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="resetEmail" 
                                   placeholder="Nhập email của bạn" required
                                   oninvalid="this.setCustomValidity('Vui lòng nhập địa chỉ email hợp lệ để khôi phục')" 
                                   oninput="this.setCustomValidity('')">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-warning text-dark w-100 fw-bold py-2 mb-3" id="btnReset" style="background-color: #f26b21; color: white !important; border: none;">
                        <i class="fas fa-paper-plane me-2"></i> Gửi liên kết khôi phục
                    </button>

                    <div class="text-center">
                        <a href="admin-login.html" class="text-decoration-none text-muted small hover-primary">
                            <i class="fas fa-arrow-left me-1"></i> Quay lại Đăng nhập
                        </a>
                    </div>
                </form>
                
            </div>
        </div>
    </div>

    <script src="../assets/vendor/jquery/jquery.min.js"></script>
    <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/vendor/chart/chart.umd.min.js"></script>
    <script src="assets/vendor/summernote/summernote-bs5.min.js"></script>
    <script src="assets/vendor/datatables/js/datatables.min.js"></script>
    <script src="assets/js/admin-auth.js"></script> 
</body>
</html>
